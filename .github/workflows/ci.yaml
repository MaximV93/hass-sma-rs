name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Deny warnings on clippy too.
  CLIPPY_ARGS: "-- -D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets ${{ env.CLIPPY_ARGS }}

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory DB can race; never block releases
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # See deny.toml for rationale. audit-check doesn't read
          # deny.toml so ignores must be duplicated here.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2021-0046

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory; tune deny.toml over time
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2

  build:
    name: release build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release

  docker:
    name: docker (amd64)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
      id-token: write   # for Cosign OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires lowercase repository names; github.repository_owner
      # may be mixed case (e.g. MaximV93). Fold to lowercase here.
      - name: Compute lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/addon/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/hass-sma-rs:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/hass-sma-rs:latest

      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign image (keyless / OIDC)
        if: github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ steps.owner.outputs.lc }}/hass-sma-rs@${{ steps.build.outputs.digest }}

      - name: Trivy CVE scan
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.lc }}/hass-sma-rs:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: SBOM (SPDX)
        if: github.event_name == 'push'
        uses: anchore/sbom-action@v0.24.0
        continue-on-error: true
        with:
          image: ghcr.io/${{ steps.owner.outputs.lc }}/hass-sma-rs:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
